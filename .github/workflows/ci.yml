name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  # Test job re-enabled 2026-04-20 per MASTER_PLAN_V8 §4 P0-7.
  # Promoted to a HARD gate 2026-04-25 per Wave 6.99-AP — the prior
  # `continue-on-error: true` setting masked real test regressions because
  # the failed `Test` step still let the job exit 0, so PRs reported all-
  # green even when `npm test` failed. With this change a red `Test` step
  # blocks the merge, restoring full regression enforcement.
  #
  # Prior context: the earlier shard+retry approach (commits 6faf04b,
  # d3de864) was preempted ~30-50% of runs. A self-hosted runner is
  # the long-term fix (docs/SELF_HOSTED_RUNNER_SETUP.md). If the hosted
  # runners reintroduce preemption flake, restore `continue-on-error: true`
  # explicitly here AND re-open the regression-visibility tracking issue.
  test:
    name: Tests (shard ${{ matrix.shard }}/6)
    # MATRIX-PARALLEL APPROACH — each shard is a separate runner.
    #
    # Prior failure pattern (5 consecutive CI runs through 40fa871):
    # shards 1+2 of the FIRST WAVE were canceled with "runner has
    # received a shutdown signal" while shards 3-6 (later waves)
    # passed cleanly with 97/97 each. Root cause was contention
    # between the test matrix and the typecheck-build matrix —
    # both jobs started simultaneously, exhausting the free-tier
    # runner pool, and GH Actions reclaimed the runners that were
    # competing for capacity. Prior mitigation attempts via max-
    # parallel reductions (6 -> 3 -> 2) never fully fixed it
    # because the contention was BETWEEN jobs, not within the
    # matrix.
    #
    # Fix: needs typecheck-build serializes Tests AFTER the
    # typecheck-build job finishes, so the runner pool drains
    # before tests start. Adds ~60-90 s wall time but eliminates
    # the flake. The duplicate typecheck/build steps that used
    # to run on shard 1 are removed because the typecheck-build
    # job already gates the same checks.
    needs: typecheck-build
    runs-on: ubuntu-22.04
    # Per-shard timeout: each shard runs ~22-65 s locally; bumping
    # to 8 min covers slow CI runners with 4x safety margin and
    # surfaces hangs faster than the prior 15 min cap.
    timeout-minutes: 8
    strategy:
      fail-fast: false
      # With needs typecheck-build removing cross-job contention,
      # we can safely raise max-parallel back to 3 (2 waves of 3
      # shards = ~4-6 min total) without runner reclaim risk.
      max-parallel: 3
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Test (shard ${{ matrix.shard }}/6)
        # WOTANN_TEST_TRACE_LOAD=1 activates the load-tracer setupFile
        # which emits `[wotann-load] <iso-ts> <file>` per test file as
        # it loads. Verbose reporter surfaces test completions for
        # failure diagnosis. Typecheck + build are NOT duplicated here
        # because the typecheck-build job (this job's prerequisite via
        # `needs:`) already gates them.
        run: npx vitest run --shard=${{ matrix.shard }}/6 --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          WOTANN_TEST_TRACE_LOAD: "1"

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json
