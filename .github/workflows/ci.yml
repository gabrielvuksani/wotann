name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  test:
    name: Test ${{ matrix.shard }}/2 (Node ${{ matrix.node-version }} / ubuntu-latest)
    # Hosted ubuntu-latest runner (2026-04-20): originally moved to
    # self-hosted because hosted runners were pre-empting shard 1
    # mid-vitest, but with the codebase-health perf fix dropping that
    # suite from 13.48s → 198ms, full `npm test` now completes in ~46s
    # — well under the pre-emption window. Moving back to hosted removes
    # the self-hosted-runner dependency (jobs queued forever when no
    # runner was online). nick-fields/retry@v3 wraps vitest so the
    # occasional flaky hosted-runner hiccup retries once before failing.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Run vitest shard ${{ matrix.shard }}/2
        # nick-fields/retry@v3 wraps vitest so transient hosted-runner
        # shutdowns retry once before the job fails. The tests
        # themselves pass (367 files / 5860 tests, ~46s local); retries
        # exist purely for infra resilience.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: npm test -- --shard ${{ matrix.shard }}/2
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json
