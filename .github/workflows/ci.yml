name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  test:
    name: Test ${{ matrix.shard }}/4 (Node ${{ matrix.node-version }} / ubuntu-latest)
    # 4-shard split (2026-04-20): 2-shard runs were being killed by
    # "runner received a shutdown signal" ~20-55s in. Shrinking each
    # shard to ~92 test files reduces per-job wall-clock to ~12-15s,
    # well below the hosted-runner preemption window. nick-fields/retry
    # wraps vitest for the rare step-level failure.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Run vitest shard ${{ matrix.shard }}/4
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: npm test -- --shard ${{ matrix.shard }}/4
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json
