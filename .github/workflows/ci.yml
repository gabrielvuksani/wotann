name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  # Test job re-enabled 2026-04-20 per MASTER_PLAN_V8 §4 P0-7.
  # Promoted to a HARD gate 2026-04-25 per Wave 6.99-AP — the prior
  # `continue-on-error: true` setting masked real test regressions because
  # the failed `Test` step still let the job exit 0, so PRs reported all-
  # green even when `npm test` failed. With this change a red `Test` step
  # blocks the merge, restoring full regression enforcement.
  #
  # Prior context: the earlier shard+retry approach (commits 6faf04b,
  # d3de864) was preempted ~30-50% of runs. A self-hosted runner is
  # the long-term fix (docs/SELF_HOSTED_RUNNER_SETUP.md). If the hosted
  # runners reintroduce preemption flake, restore `continue-on-error: true`
  # explicitly here AND re-open the regression-visibility tracking issue.
  test:
    name: Tests (hard gate)
    runs-on: ubuntu-latest
    # Bumped from 15 → 30. With 583 test files and the OOM fix forcing
    # single-fork sequential execution (vitest.config.ts maxWorkers: 1),
    # CI takes ~3 minutes locally on a fast Mac but the ubuntu-latest
    # runner is slower per-core. 30 min gives generous headroom for
    # slow shards without ever hiding a real hang.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Typecheck
        run: npx tsc --noEmit
      # Split the 583-test-file suite into 3 sharded vitest runs so each
      # fork starts with a fresh V8 heap. Single-fork serial runs hit a
      # CI OOM cliff at ~146 s of accumulated memory even with 6 GB
      # max-old-space; threads pool broke local tests (some test files
      # mutate process-globals on import). Sharding keeps fork memory
      # bounded by N/3 files per shard. Shards run serially in this job
      # to keep memory pressure linear; ~2-3 min each = ~7-9 min total.
      - name: Test (shard 1/3)
        run: npx vitest run --shard=1/3
        env:
          NODE_OPTIONS: --max-old-space-size=6144
      - name: Test (shard 2/3)
        run: npx vitest run --shard=2/3
        env:
          NODE_OPTIONS: --max-old-space-size=6144
      - name: Test (shard 3/3)
        run: npx vitest run --shard=3/3
        env:
          NODE_OPTIONS: --max-old-space-size=6144
      - name: Build
        run: npm run build

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json
