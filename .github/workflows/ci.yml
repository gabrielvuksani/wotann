name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  # Test job re-enabled 2026-04-20 per MASTER_PLAN_V8 §4 P0-7.
  # Promoted to a HARD gate 2026-04-25 per Wave 6.99-AP — the prior
  # `continue-on-error: true` setting masked real test regressions because
  # the failed `Test` step still let the job exit 0, so PRs reported all-
  # green even when `npm test` failed. With this change a red `Test` step
  # blocks the merge, restoring full regression enforcement.
  #
  # Prior context: the earlier shard+retry approach (commits 6faf04b,
  # d3de864) was preempted ~30-50% of runs. A self-hosted runner is
  # the long-term fix (docs/SELF_HOSTED_RUNNER_SETUP.md). If the hosted
  # runners reintroduce preemption flake, restore `continue-on-error: true`
  # explicitly here AND re-open the regression-visibility tracking issue.
  test:
    name: Tests
    # ─────────────────────────────────────────────────────────────
    # ADVISORY (non-blocking) Tests job — Wave 6.99-AP regression.
    #
    # Wave 6.99-AP (2026-04-25) promoted Tests to a HARD gate after
    # `continue-on-error: true` had let regressions slip through.
    # That promotion was correct for a stable runner pool; on this
    # free-tier account the promotion has been counter-productive
    # because GH Actions reclaims the runner mid-run regardless of
    # workflow shape:
    #
    #   Run 24970222405 — matrix max-parallel:2 → shards 1+2 killed
    #   Run 24971021895 — matrix max-parallel:3 + needs → same
    #   Run 24971170146 — single-runner job → killed mid-test
    #   Run 24971215497 — single-runner + reporter=default → same
    #   Run 24971371484 — single-runner + 3-attempt retry loop →
    #     attempt 1 killed at 2 min via SIGTERM (exit 143); bash
    #     retry loop never got a chance because the runner died.
    #
    # Empirical mid-run cancel pattern:
    #   - typecheck-build always succeeds (~1 min)
    #   - Tests start, run successfully for 2-3 min (250+ test files
    #     pass), then GH Actions emits SIGTERM with no in-progress
    #     reason and no concurrent push. Local runs take 180 s and
    #     pass cleanly with 9510/9510. Code is fine; the infra is not.
    #
    # Compromise: revert Tests to advisory (`continue-on-error: true`)
    # so the CI status check stops permanently red while still
    # surfacing real regressions in the job log. This restores the
    # status-quo that worked from at least 2026-04-20 → 2026-04-25
    # before the Wave 6.99-AP escalation. The HARD-gate property
    # will be restored once docs/SELF_HOSTED_RUNNER_SETUP.md is
    # actioned (deferred since 2026-04-20). Until then, contributors
    # are expected to verify locally:
    #   npx tsc --noEmit && npx vitest run
    # before pushing — and the typecheck-build job (still HARD-gated)
    # catches the most common breakages (type errors, lint failures,
    # build failures).
    # ─────────────────────────────────────────────────────────────
    needs: typecheck-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Wave 6.99-AP gate softened back to advisory pending self-hosted
    # runner. Keep the regression visible (Tests still appear in the
    # check list) without blocking merges on the GH Actions flake.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Test
        # `--reporter=default` keeps log volume modest. vitest's
        # internal worker pool parallelizes across runner CPUs.
        run: npx vitest run --reporter=default
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          WOTANN_TEST_TRACE_LOAD: "0"

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json

  # Catches the failure mode that bit us in commits 21854a7..525819f:
  # new Swift files added to disk but not registered in the xcodeproj
  # target memberships. CI was previously TS-only so iOS-only breakage
  # silently shipped to origin/main.
  ios-build:
    name: iOS Simulator build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve SPM packages
        working-directory: ios
        run: xcrun xcodebuild -resolvePackageDependencies -project WOTANN.xcodeproj
      - name: xcodebuild iOS Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcrun xcodebuild -project WOTANN.xcodeproj -scheme WOTANN -destination 'generic/platform=iOS Simulator' -configuration Debug -skipPackagePluginValidation CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build 2>&1 | tail -200
