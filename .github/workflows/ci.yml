name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  # Test job re-enabled 2026-04-20 per MASTER_PLAN_V8 §4 P0-7.
  # Promoted to a HARD gate 2026-04-25 per Wave 6.99-AP — the prior
  # `continue-on-error: true` setting masked real test regressions because
  # the failed `Test` step still let the job exit 0, so PRs reported all-
  # green even when `npm test` failed. With this change a red `Test` step
  # blocks the merge, restoring full regression enforcement.
  #
  # Prior context: the earlier shard+retry approach (commits 6faf04b,
  # d3de864) was preempted ~30-50% of runs. A self-hosted runner is
  # the long-term fix (docs/SELF_HOSTED_RUNNER_SETUP.md). If the hosted
  # runners reintroduce preemption flake, restore `continue-on-error: true`
  # explicitly here AND re-open the regression-visibility tracking issue.
  test:
    name: Tests (shard ${{ matrix.shard }}/6)
    # MATRIX-PARALLEL APPROACH — each shard is a separate runner.
    # First attempt with all 6 shards firing simultaneously got 3
    # successes + 3 "runner has received a shutdown signal" errors,
    # which suggests GitHub's free-tier parallel-job pressure was
    # causing some runners to be reclaimed. Cap max-parallel at 3
    # so the runner pool stays warm without hitting the contention
    # cliff. Total wall time: ~6-9 min for 2 waves of 3 shards each.
    # Each shard still gets its own clean runner (no memory
    # accumulation across the full 583-file suite).
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Typecheck (only on shard 1)
        if: matrix.shard == 1
        run: npx tsc --noEmit
      - name: Test (shard ${{ matrix.shard }}/6)
        run: npx vitest run --shard=${{ matrix.shard }}/6
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Build (only on shard 1)
        if: matrix.shard == 1
        run: npm run build

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json
