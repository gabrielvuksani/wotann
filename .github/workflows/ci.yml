name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  test:
    name: Test ${{ matrix.shard }}/2 (Node ${{ matrix.node-version }} / self-hosted)
    # Self-hosted runner (2026-04-19): GitHub Actions hosted Ubuntu
    # runners were pre-empting shard 1 mid-vitest (~6-16s in, no test
    # failure preceding). nick-fields/retry@v3 couldn't recover because
    # the entire runner process was being killed. Moving to a
    # self-hosted runner (labels: self-hosted, linux) eliminates the
    # pre-emption class of failure. Fallback label ensures pending jobs
    # queue rather than fail when no runner is online.
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Run vitest shard ${{ matrix.shard }}/2
        run: npm test -- --shard ${{ matrix.shard }}/2
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json
