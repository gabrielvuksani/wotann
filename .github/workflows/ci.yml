name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-build:
    name: Typecheck + Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Session-10 audit fix: ESLint 9 flat config exists in
        # eslint.config.js but was not CI-enforced. Shard failures could
        # silently slip lint regressions through. Now gated at the same
        # tier as typecheck.
        run: npm run lint

      - name: Build
        run: npm run build

  # Test job re-enabled 2026-04-20 per MASTER_PLAN_V8 §4 P0-7.
  # Promoted to a HARD gate 2026-04-25 per Wave 6.99-AP — the prior
  # `continue-on-error: true` setting masked real test regressions because
  # the failed `Test` step still let the job exit 0, so PRs reported all-
  # green even when `npm test` failed. With this change a red `Test` step
  # blocks the merge, restoring full regression enforcement.
  #
  # Prior context: the earlier shard+retry approach (commits 6faf04b,
  # d3de864) was preempted ~30-50% of runs. A self-hosted runner is
  # the long-term fix (docs/SELF_HOSTED_RUNNER_SETUP.md). If the hosted
  # runners reintroduce preemption flake, restore `continue-on-error: true`
  # explicitly here AND re-open the regression-visibility tracking issue.
  test:
    name: Tests
    # SINGLE-RUNNER APPROACH — all 9510 tests in one ubuntu runner.
    #
    # History of attempted fixes:
    # 1. matrix shard 1..6, max-parallel: 6 — got 3 successes + 3
    #    "runner has received a shutdown signal" errors.
    # 2. matrix shard 1..6, max-parallel: 3 — same shutdown failures
    #    on shards 1+2 of the first wave.
    # 3. matrix shard 1..6, max-parallel: 2 — same.
    # 4. matrix shard 1..6, max-parallel: 3, needs: typecheck-build
    #    — STILL same shutdown failures on shards 1+2. By this point
    #    the typecheck-build matrix had fully completed (so cross-
    #    job contention was eliminated), but GH Actions free-tier
    #    runners still reclaimed the first-wave Tests shards mid-run
    #    despite zero competing jobs.
    #
    # Local evidence: each shard runs in ~24 s on a developer Mac
    # (vitest run --shard=1/6 → 1606 tests passed, 24 s). Full
    # 9510-test suite runs in ~180 s locally. CI has the same code
    # paths and dependencies, so the failure was purely an
    # infrastructure flake, not a test regression.
    #
    # Fix: drop the matrix entirely. One runner, one job, all 9510
    # tests serialized through vitest's internal worker pool. Total
    # wall time is ~5 min (npm install + build + 9510 tests) vs
    # ~3-4 min for a working matrix run, but matrix never reliably
    # completes on free-tier runners. Reliability > speed here.
    needs: typecheck-build
    runs-on: ubuntu-latest
    # Single-job timeout: install (~30 s) + native rebuild (~5 s) +
    # 9510 vitest tests (~180 s locally; CI usually 1.5-2x slower)
    # → 6-8 min realistic. Cap at 15 min so a hang surfaces clearly.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3
      - name: Test
        # `--reporter=basic` keeps log volume manageable on a single
        # runner (verbose reporter would emit ~9k lines and slow
        # down the runner via stderr buffering on previous matrix
        # attempts). vitest's internal worker pool still parallelizes
        # tests across all available CPUs on the runner.
        run: npx vitest run --reporter=basic
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          WOTANN_TEST_TRACE_LOAD: "0"

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install desktop deps
        working-directory: desktop-app
        run: npm ci --ignore-scripts
      - name: Typecheck desktop
        working-directory: desktop-app
        run: npx tsc --noEmit --project tsconfig.app.json
