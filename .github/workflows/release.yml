name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-x64
          - os: macos-latest
            target: macos-arm64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # postject is required by sea-bundle.sh. Install it once up-front so
      # the first `npx postject` inside the bundle script is a no-op fetch.
      - name: Install postject
        shell: bash
        run: npm install --no-save postject
      - name: Build + SEA bundle (via build-all.sh)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          # build-all.sh runs: npm run build -> sea-bundle.sh -> archive+sha256.
          # Honest failure: non-zero exit propagates and fails the job.
          bash scripts/release/build-all.sh "$VERSION"
      - name: Build + SEA bundle (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          # Same build-all.sh path — bash-for-Windows (Git Bash) on the
          # windows-latest runner. postject handles Windows PE binary format.
          bash scripts/release/build-all.sh "$VERSION"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wotann-${{ matrix.target }}
          path: dist/release/*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          draft: true
          generate_release_notes: true

  npm-publish:
    name: npm publish
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
      - run: npm ci --ignore-scripts
      - run: npm run build
      # Run strengthened prepublish-check BEFORE publish. Fails loudly if
      # any bundle-health gate fails — blocks a broken publish.
      - run: node scripts/release/prepublish-check.mjs
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
