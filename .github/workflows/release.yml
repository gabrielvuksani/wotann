name: WOTANN Release v2

# ─────────────────────────────────────────────────────────────────────────────
# WOTANN Release Pipeline v2 (canonical 8-asset set)
#
# NB: workflow `name:` was changed from "Release" to "WOTANN Release v2" on
# 2026-04-25 to force GitHub's workflow registry to re-parse this file
# (SB-14 fix). When a workflow keeps the same `name:` but changes its body,
# GitHub sometimes pins the previous parse result, causing every run to
# show 30/30 startup_failure with no log lines. Renaming forces a fresh
# parse on the next push event.
#
# Canonical assets produced per release (no more, no less):
#   wotann-${VER}-macos-arm64.dmg          Tauri GUI — drag to Applications
#   wotann-${VER}-macos-arm64.dmg.sha256
#   wotann-${VER}-macos-arm64.tar.gz       CLI SEA binary tarball
#   wotann-${VER}-macos-arm64.tar.gz.sha256
#   wotann-${VER}-linux-x64.tar.gz         CLI SEA binary tarball
#   wotann-${VER}-linux-x64.tar.gz.sha256
#   wotann-${VER}-windows-x64.exe          CLI SEA single-file
#   wotann-${VER}-windows-x64.exe.sha256
#
# Build graph:
#   ┌──────────────────────┐  ┌──────────────────────┐
#   │ macos-gui-dmg        │  │ macos-cli-tarball    │
#   │ macos-latest / arm64 │  │ macos-latest / arm64 │
#   └──────────┬───────────┘  └──────────┬───────────┘
#              ▼                         ▼
#   ┌──────────────────────┐  ┌──────────────────────┐
#   │ linux-cli-tarball    │  │ windows-cli-exe      │
#   │ ubuntu-latest        │  │ windows-latest       │
#   └──────────┬───────────┘  └──────────┬───────────┘
#              ▼                         ▼
#              └──────────┬──────────────┘
#                         ▼
#                 ┌─────────────────┐
#                 │ publish-release │
#                 │ ubuntu-latest   │
#                 └─────────────────┘
#
# Trigger: push of any tag matching `v*.*.*` (e.g. `git tag v0.4.1 && git push origin v0.4.1`).
#
# Environmental assumptions (documented inline where they apply):
#   - actions/setup-node@v4 on GitHub-hosted runners provides an official
#     statically-linked Node from nodejs.org at `/usr/local/bin/node` (macos /
#     linux) or `C:\hostedtoolcache\node\...` (windows). This Node has the SEA
#     fuse sentinel compiled into the launcher, which Homebrew's Node on
#     arm64 macs does NOT. See docs/SEA_BUILD_ENVIRONMENTAL_GATE.md for why
#     this matters.
#   - Tauri bundler on macos-latest produces its .app + .dmg under
#     src-tauri/target/aarch64-apple-darwin/release/bundle/{macos,dmg}/.
#     The .dmg itself is created by `create-dmg` invoked by Tauri's bundler.
#   - Ad-hoc code-signing (`codesign --sign -`) is applied to the binary
#     INSIDE the .app only. We never ad-hoc-sign the .dmg; macOS Sequoia
#     rejects ad-hoc-signed DMGs as "damaged" and refuses to mount them.
#   - SHA256 checksum format is `<hex-hash>  <filename>\n` to match the
#     output of `shasum -a 256` / `sha256sum`. The install.sh resolver at
#     the user's machine uses `awk '{print $1}'` to extract the hash.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*" # also fire on prerelease tags like v0.4.1-rc1

permissions:
  contents: write

# Cancel duplicate runs if the same tag is pushed twice in a row.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Job 1: macos-gui-dmg
  # Builds the Tauri 2 desktop app and produces a drag-to-Applications DMG.
  # ───────────────────────────────────────────────────────────────────────
  macos-gui-dmg:
    name: Build macOS GUI DMG (Tauri arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    # Job-level env hoists the secret presence into a plain string ("true" /
    # "false") so step-level `if:` expressions can branch on it. GitHub
    # Actions does NOT permit `secrets.*` inside step `if:` expressions —
    # only inside `env:`/`with:`/`run:`. This was the root cause of the
    # release.yml parse failure that blocked v0.5.0 (SB-02).
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && 'true' || 'false' }}
    steps:
      # Third-party actions are pinned to SHAs (SB-14 hardening) so a
      # compromised tag cannot rewrite history under us. Tag annotation is
      # kept as a comment so a human reviewer can see what version the
      # SHA represents at a glance.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Official nodejs.org Node via setup-node. Cargo cache comes later.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      # Rust toolchain with aarch64-apple-darwin target. The macos-latest
      # runner is itself arm64 so this is a native build, not cross-compile.
      # dtolnay/rust-toolchain has no version tags, so we pin to the current
      # `stable` branch HEAD. Re-pin if the branch advances and you want
      # the newer toolchain.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin

      # Cache Cargo registry + target dir. Target dir is the big win —
      # Tauri's debug deps compile fresh otherwise (~5 min → ~1 min).
      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-app/src-tauri/target
          key: cargo-macos-arm64-${{ hashFiles('desktop-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-macos-arm64-

      - name: Install npm deps
        working-directory: desktop-app
        run: npm ci

      - name: Derive release version from tag
        id: ver
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      # Tauri's bundler runs `vite build` first (via beforeBuildCommand in
      # tauri.conf.json) then compiles Rust, then assembles the .app and
      # wraps it in a .dmg via create-dmg. Output lives at
      # src-tauri/target/aarch64-apple-darwin/release/bundle/{macos,dmg}/.
      - name: Tauri build (arm64 DMG)
        working-directory: desktop-app
        run: |
          set -euo pipefail
          npm run tauri -- build --target aarch64-apple-darwin

      # Sign the .app. Two paths:
      #   1. DEVELOPER_ID path (real cert in secrets) → proper Developer ID
      #      signing with runtime hardening + notarization via xcrun notarytool.
      #   2. Adhoc path (no secrets set) → ad-hoc "-" signature, runtime
      #      hardening enabled so the binary is internally consistent with
      #      the sandboxed entitlements. Users outside the developer pay
      #      wall will see Gatekeeper "cannot verify developer" on first
      #      open — expected for adhoc builds.
      # Gating on APPLE_SIGNING_IDENTITY being set keeps both paths valid
      # without requiring secrets to be present for a working release.
      # All secret values are passed through env: blocks (never inlined)
      # to avoid command-injection risk.
      # Secret-name canonicalization (must match docs/RELEASE_PIPELINE_V2.md):
      #   APPLE_SIGNING_IDENTITY     — full identity string ("Developer ID Application: Acme Inc (TEAMID)")
      #   APPLE_ID                   — Apple ID email used for notarization
      #   APPLE_TEAM_ID              — 10-char team ID
      #   APPLE_PASSWORD             — app-specific password from appleid.apple.com (renamed from APPLE_APP_PASSWORD)
      #   APPLE_CERTIFICATE          — base64-encoded .p12 (renamed from APPLE_CERTIFICATE_P12)
      #   APPLE_CERTIFICATE_PASSWORD — passphrase for the .p12
      - name: Sign and notarize the app (Developer ID path)
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          APP_PATH="desktop-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/WOTANN.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected $APP_PATH to exist after Tauri build"
            exit 1
          fi
          # Import signing cert into a temporary keychain
          KEYCHAIN="build.keychain"
          KEYCHAIN_PWD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          printf '%s' "$APPLE_CERTIFICATE" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          rm -f /tmp/cert.p12
          # Sign with Developer ID + hardened runtime + entitlements
          codesign --force --deep --options runtime --timestamp \
            --entitlements desktop-app/src-tauri/Entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"
          codesign --verify --strict --verbose=2 "$APP_PATH"
          # Notarize via xcrun notarytool (replaces deprecated altool)
          NOTARIZE_ZIP="/tmp/WOTANN-notarize.zip"
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          # Staple the notarization ticket so Gatekeeper works offline
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm -f "$NOTARIZE_ZIP"
          # Clean up keychain
          security delete-keychain "$KEYCHAIN" || true

      - name: Ad-hoc sign the app binary (fallback when no Developer ID secrets)
        if: env.HAS_APPLE_CERT != 'true'
        run: |
          set -euo pipefail
          APP_PATH="desktop-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/WOTANN.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected $APP_PATH to exist after Tauri build"
            ls -la "desktop-app/src-tauri/target/aarch64-apple-darwin/release/bundle/" || true
            exit 1
          fi
          # Ad-hoc ("-") identity plus hardened runtime flag and explicit
          # entitlements — matches the shape a notarized build would take,
          # minus the Developer ID cert. Users will still see Gatekeeper's
          # "cannot verify developer" on first open (expected for adhoc).
          codesign --force --deep --options runtime \
            --entitlements desktop-app/src-tauri/Entitlements.plist \
            --sign - "$APP_PATH"
          echo "Ad-hoc signature applied to $APP_PATH"
          codesign -dv "$APP_PATH" 2>&1 || true

      # Tauri names the DMG `WOTANN_<cargo-version>_aarch64.dmg`. Rename to
      # our canonical format AND regenerate sha256 against the renamed file.
      - name: Rename DMG and compute sha256
        id: dmg
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          SRC_DIR="desktop-app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          OUT_DIR="dist/release"
          mkdir -p "$OUT_DIR"
          # Tauri uses the Cargo.toml version in the filename, which may
          # differ from the release tag version. Glob-match so we don't
          # depend on the exact Cargo version.
          SRC_DMG=$(ls "$SRC_DIR"/*.dmg | head -1)
          if [ -z "$SRC_DMG" ] || [ ! -f "$SRC_DMG" ]; then
            echo "::error::No DMG found under $SRC_DIR"
            ls -la "$SRC_DIR" || true
            exit 1
          fi
          DEST="$OUT_DIR/wotann-${VERSION}-macos-arm64.dmg"
          cp "$SRC_DMG" "$DEST"
          ( cd "$OUT_DIR" && shasum -a 256 "wotann-${VERSION}-macos-arm64.dmg" > "wotann-${VERSION}-macos-arm64.dmg.sha256" )
          echo "dmg=$DEST" >> "$GITHUB_OUTPUT"
          echo "DMG size: $(wc -c < "$DEST") bytes"
          ls -la "$OUT_DIR"

      - name: Upload macOS GUI DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-gui-dmg
          path: |
            dist/release/wotann-*-macos-arm64.dmg
            dist/release/wotann-*-macos-arm64.dmg.sha256
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────
  # Job 2: macos-cli-tarball
  # Produces the CLI SEA binary tarball for macOS arm64.
  # ───────────────────────────────────────────────────────────────────────
  macos-cli-tarball:
    name: Build macOS CLI tarball (SEA arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # setup-node@v4 installs Node from nodejs.org into the runner's
      # hosted tool cache. That Node IS statically linked AND contains the
      # SEA fuse sentinel in the launcher — which is exactly what
      # sea-bundle.sh needs. Homebrew's Node on arm64 would fail the
      # SEA fuse preflight (BLOCKED-NEEDS-SEA-NODE).
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      # postject must be on PATH for sea-bundle.sh's `npx postject` call.
      # Installing at the project level (not globally) keeps it cached by
      # the npm cache and avoids a cold `npx --yes` fetch on each run.
      - name: Install postject
        run: npm install --no-save postject

      - name: Derive release version from tag
        id: ver
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # build-all.sh runs: npm run build → esbuild-cjs → sea-bundle.sh →
      # tar+sha256 in dist/release/. Exits non-zero on any step failure,
      # including the SEA fuse preflight in sea-bundle.sh.
      - name: Build SEA + tarball
        env:
          WOTANN_VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/release/build-all.sh "${{ steps.ver.outputs.version }}"

      # Keep ONLY the tarball + sha256. Discard the raw binary artifact
      # that build-all.sh also leaves in dist/release/ — the canonical
      # asset set explicitly drops raw SEA binaries.
      - name: Prune non-canonical artifacts
        run: |
          set -euo pipefail
          cd dist/release
          # Keep .tar.gz and .tar.gz.sha256 for macos-arm64 only; delete
          # the loose `wotann-<ver>-macos-arm64` binary and its sha256.
          find . -maxdepth 1 -type f ! -name '*.tar.gz' ! -name '*.tar.gz.sha256' -delete
          ls -la

      - name: Upload macOS CLI tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-cli-tarball
          path: |
            dist/release/wotann-*-macos-arm64.tar.gz
            dist/release/wotann-*-macos-arm64.tar.gz.sha256
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────
  # Job 3: linux-cli-tarball
  # Produces the CLI SEA binary tarball for linux x64.
  # ───────────────────────────────────────────────────────────────────────
  linux-cli-tarball:
    name: Build Linux CLI tarball (SEA x64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm install --no-save postject

      - name: Derive release version from tag
        id: ver
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build SEA + tarball
        env:
          WOTANN_VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/release/build-all.sh "${{ steps.ver.outputs.version }}"

      - name: Prune non-canonical artifacts
        run: |
          set -euo pipefail
          cd dist/release
          find . -maxdepth 1 -type f ! -name '*.tar.gz' ! -name '*.tar.gz.sha256' -delete
          ls -la

      - name: Upload Linux CLI tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-cli-tarball
          path: |
            dist/release/wotann-*-linux-x64.tar.gz
            dist/release/wotann-*-linux-x64.tar.gz.sha256
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────
  # Job 4: windows-cli-exe
  # Produces the CLI SEA .exe for windows x64. No tarball — the raw .exe
  # is what Windows users expect (and double-clicking a .tar.gz is awful).
  # ───────────────────────────────────────────────────────────────────────
  windows-cli-exe:
    name: Build Windows CLI .exe (SEA x64)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      # Windows runners ship with Git Bash. Explicitly use bash for the
      # build-all.sh invocation; postject supports PE binary injection
      # via the --macho-segment-name flag being skipped on Windows
      # (sea-bundle.sh already gates that behind `$HOST_OS = macos`).
      - name: Install deps
        shell: bash
        run: npm ci --ignore-scripts
      - name: Install postject
        shell: bash
        run: npm install --no-save postject

      - name: Derive release version from tag
        id: ver
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build SEA .exe
        shell: bash
        env:
          WOTANN_VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/release/build-all.sh "${{ steps.ver.outputs.version }}"

      # Windows asset layout: keep the .exe, delete the .tar.gz that
      # build-all.sh also produces (Windows users expect .exe, not a
      # POSIX-flavoured archive wrapped around one).
      - name: Prune to .exe + .sha256 and compute hash
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          cd dist/release
          # Remove the tar.gz wrappers — we only want the bare .exe.
          rm -f ./*.tar.gz ./*.tar.gz.sha256
          EXE="wotann-${VERSION}-windows-x64.exe"
          if [ ! -f "$EXE" ]; then
            echo "::error::Expected $EXE to exist"
            ls -la
            exit 1
          fi
          # Compute sha256 for the .exe explicitly (build-all.sh only
          # hashes the tarball, which we just deleted).
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$EXE" > "${EXE}.sha256"
          else
            sha256sum "$EXE" > "${EXE}.sha256"
          fi
          ls -la

      - name: Upload Windows .exe artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-cli-exe
          path: |
            dist/release/wotann-*-windows-x64.exe
            dist/release/wotann-*-windows-x64.exe.sha256
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────
  # Job 5: publish-release
  # Waits for all four build jobs, collects the 8 canonical assets, does
  # a final sha256 verification pass, and creates the GitHub Release.
  # ───────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs:
      - macos-gui-dmg
      - macos-cli-tarball
      - linux-cli-tarball
      - windows-cli-exe
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive release version from tag
        id: ver
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/release
          merge-multiple: true

      # Enforce the canonical 8-asset manifest. If any file is missing or
      # any unexpected file sneaks in, fail the release rather than ship
      # a messy asset list.
      - name: Verify canonical 8-asset manifest
        run: bash scripts/release/verify-release-assets.sh "${{ steps.ver.outputs.version }}" dist/release

      - name: Re-verify all sha256 checksums
        run: |
          set -euo pipefail
          cd dist/release
          # The sha256 files were produced on their respective runners.
          # Verify them here on a neutral runner to catch corruption
          # during artifact upload/download.
          for sha in *.sha256; do
            echo "Verifying $sha"
            sha256sum -c "$sha"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ───────────────────────────────────────────────────────────────────────
  # Job 6 (optional): npm-publish
  # Publishes the CJS-bundled package to npm. Only fires on stable (non-rc)
  # tags so prerelease tags don't clutter the npm registry.
  # ───────────────────────────────────────────────────────────────────────
  npm-publish:
    name: npm publish
    needs:
      - macos-gui-dmg
      - macos-cli-tarball
      - linux-cli-tarball
      - windows-cli-exe
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org/"
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Pre-publish bundle-health gates
        run: node scripts/release/prepublish-check.mjs
      - name: npm publish
        # TODO: requires secret NPM_TOKEN (Automation token from npmjs.com).
        # If NPM_TOKEN is unset, this step will fail — that's intentional so
        # a broken npm publish blocks the release visibly.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
