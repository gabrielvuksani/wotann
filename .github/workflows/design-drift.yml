name: Design Drift — On PR

# V9 T8.7 — comments on every PR with the structural design diff
# between the branch's design tokens and main's. Catches accidental
# token deletions and renamed canvases before they merge. Pure
# read-only — never blocks a PR — review remains a human decision.
#
# Source-of-truth files:
#   - src/design/tokens.ts                     (TS source for all tokens)
#   - .wotann/canvases/*.json                  (persisted Canvas state)
#   - ios/WOTANN/DesignSystem/WotannTokens.swift  (generated mirror)
#
# Security: NO untrusted user input is read by any run: step. The
# only inputs are git refs (controlled by the workflow) and file
# contents from the checked-out tree. PR title/body are NOT touched.
# The sticky comment uses actions/github-script, which uses the typed
# context object, not shell interpolation.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/design/**"
      - ".wotann/canvases/**"
      - "ios/WOTANN/DesignSystem/**"
      - "src/mcp/servers/design-bridge.ts"

concurrency:
  group: design-drift-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          path: head
          fetch-depth: 0

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          path: base

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: head/package-lock.json

      - name: Install (head)
        working-directory: head
        run: npm ci --no-audit --no-fund

      - name: Verify design — head
        working-directory: head
        run: |
          mkdir -p ../artifacts
          if [ -f src/cli/commands/design-verify.ts ]; then
            npx tsx src/cli/index.ts design verify --json > ../artifacts/head.json 2>../artifacts/head.err || true
          else
            printf '%s' '{"ok":false,"error":"design-verify not on head"}' > ../artifacts/head.json
          fi

      - name: Install (base)
        working-directory: base
        run: npm ci --no-audit --no-fund

      - name: Verify design — base
        working-directory: base
        run: |
          mkdir -p ../artifacts
          if [ -f src/cli/commands/design-verify.ts ]; then
            npx tsx src/cli/index.ts design verify --json > ../artifacts/base.json 2>../artifacts/base.err || true
          else
            printf '%s' '{"ok":false,"error":"design-verify not on base"}' > ../artifacts/base.json
          fi

      - name: Compute drift diff
        run: |
          node -e '
            const fs = require("fs");
            const head = JSON.parse(fs.readFileSync("artifacts/head.json", "utf8"));
            const base = JSON.parse(fs.readFileSync("artifacts/base.json", "utf8"));
            const headSlots = new Set(head.tokens?.slots ?? []);
            const baseSlots = new Set(base.tokens?.slots ?? []);
            const added = [...headSlots].filter((s) => !baseSlots.has(s)).sort();
            const removed = [...baseSlots].filter((s) => !headSlots.has(s)).sort();
            const cHead = new Set(head.canvases?.ids ?? []);
            const cBase = new Set(base.canvases?.ids ?? []);
            const cAdded = [...cHead].filter((c) => !cBase.has(c)).sort();
            const cRemoved = [...cBase].filter((c) => !cHead.has(c)).sort();
            const lines = [];
            lines.push("### 🎨 Design drift");
            lines.push("");
            if (head.ok === false) lines.push("> ⚠️ Head report not OK: `" + (head.error ?? "unknown") + "`");
            if (base.ok === false) lines.push("> ℹ️ Base report not OK: `" + (base.error ?? "unknown") + "`");
            lines.push("");
            lines.push("**Tokens** — " + added.length + " added · " + removed.length + " removed");
            if (added.length) lines.push("Added: " + added.map((s) => "`" + s + "`").join(", "));
            if (removed.length) lines.push("Removed: " + removed.map((s) => "`" + s + "`").join(", "));
            lines.push("");
            lines.push("**Canvases** — " + cAdded.length + " added · " + cRemoved.length + " removed");
            if (cAdded.length) lines.push("Added: " + cAdded.map((c) => "`" + c + "`").join(", "));
            if (cRemoved.length) lines.push("Removed: " + cRemoved.map((c) => "`" + c + "`").join(", "));
            lines.push("");
            lines.push("<sub>Generated by .github/workflows/design-drift.yml (V9 T8.7).</sub>");
            fs.writeFileSync("artifacts/comment.md", lines.join("\n"), "utf8");
          '

      - name: Post sticky comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("artifacts/comment.md", "utf8");
            const marker = "<!-- design-drift-sticky -->";
            const fullBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: fullBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: fullBody });
            }
