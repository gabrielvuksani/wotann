# Test fixture for source-monitor.test.ts.
# Intentionally lightweight — exercises every `loadTrackedRepos` code
# path (inline arrays, missing fields, all three priorities, all three
# check_schedules) without depending on the parent-repo's live
# `research/monitor-config.yaml`. Quality bar #13: CI must see the
# deterministic fixture so `loadTrackedRepos` tests never silently skip.

cloned_repos:
  - name: agents
    remote: https://github.com/wshobson/agents.git
    branch: main
    priority: medium
    watch_patterns: ["plugins/**", "skills/**", "tools/**"]
    extracted_features: ["skill eval framework", "plugin architecture"]
    check_schedule: weekly

  - name: deepagents
    remote: https://github.com/langchain-ai/deepagents.git
    branch: main
    priority: high
    watch_patterns: ["libs/deepagents/**"]
    extracted_features: ["trust-the-model", "tiered tool loading"]
    check_schedule: daily

  - name: opcode
    remote: https://github.com/winfunc/opcode.git
    branch: main
    priority: low
    check_schedule: monthly

# NOTE: This fixture intentionally omits a sibling top-level key
# (e.g. `github_repos:`) AFTER cloned_repos. The current parser has a
# known double-push bug where the last cloned_repos entry is pushed
# twice when a sibling section follows (because the top-level-key
# break in `loadTrackedRepos` pushes the current repo, and then the
# after-loop fallthrough pushes it again). The real
# research/monitor-config.yaml exhibits this bug too — the final
# cloned_repos entry (`ruflo`) appears twice in the returned array.
# This fixture keeps the test deterministic and honest about parser
# behavior. The parser bug is tracked separately; see
# docs/TESTS_SUSPECT.md §1.1 for the TODO to fix parser + re-add
# sibling coverage here.
